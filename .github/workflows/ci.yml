name: ci

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  quality:
    name: format, clippy, and workspace tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test workspace
        run: cargo test --workspace

  dual-signal:
    name: engine dual-signal (${{ matrix.signal }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - signal: signal-f32
            features: "std,signal-f32"
          - signal: signal-i32
            features: "std,signal-i32"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test wyrd-for-games (${{ matrix.signal }})
        run: |
          cargo test -p wyrd-for-games \
            --no-default-features \
            --features "${{ matrix.features }}"
      - name: Test serde-ron (${{ matrix.signal }})
        run: |
          cargo test -p wyrd-for-games \
            --no-default-features \
            --features "${{ matrix.features }},serde-ron"
      - name: Test serde-json (${{ matrix.signal }})
        run: |
          cargo test -p wyrd-for-games \
            --no-default-features \
            --features "${{ matrix.features }},serde-json"
      - name: Test serde cross-codec (${{ matrix.signal }})
        run: |
          cargo test -p wyrd-for-games \
            --no-default-features \
            --features "${{ matrix.features }},serde-ron,serde-json"

  bevy-f32:
    name: bevy (signal-f32 only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - name: Test wyrd-for-games-bevy
        run: cargo test -p wyrd-for-games-bevy
      - name: Build and_door example
        run: cargo build -p wyrd-for-games-bevy --example and_door

  msrv-no-std:
    name: engine Rust 1.75 no_std (${{ matrix.signal }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        signal: [signal-f32, signal-i32]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75
      - name: Check wyrd-for-games no_std
        run: |
          cargo check -p wyrd-for-games \
            --no-default-features \
            --features "alloc,${{ matrix.signal }}"

  coverage:
    name: coverage (llvm-cov 100%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage f32 core suite (fail-under 100)
        run: |
          cargo llvm-cov --workspace --exclude wyrd-for-games-bevy \
            --lcov --output-path lcov-f32.info \
            --fail-under-lines 100
      - name: Coverage i32 core suite (fail-under 100)
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov -p wyrd-for-games \
            --no-default-features --features "std,signal-i32" \
            --lcov --output-path lcov-i32.info \
            --fail-under-lines 100
      - name: Coverage serde-ron f32 (fail-under 100)
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov -p wyrd-for-games \
            --no-default-features --features "std,signal-f32,serde-ron" \
            --fail-under-lines 100 --summary-only
      - name: Coverage serde-json f32 (fail-under 100)
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov -p wyrd-for-games \
            --no-default-features --features "std,signal-f32,serde-json" \
            --fail-under-lines 100 --summary-only
      - name: Coverage bevy f32 (fail-under 100)
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov -p wyrd-for-games-bevy \
            --lcov --output-path lcov-bevy.info \
            --fail-under-lines 100
      - name: Upload lcov
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: |
            lcov-f32.info
            lcov-i32.info
            lcov-bevy.info

  publish-readiness:
    name: package and rustdoc readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - name: Inspect published wyrd-for-games files
        run: cargo package -p wyrd-for-games --locked --list
      - name: Inspect published wyrd-for-games-bevy files
        run: cargo package -p wyrd-for-games-bevy --locked --list
      - name: Build public rustdoc without warnings
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc --workspace --no-deps
