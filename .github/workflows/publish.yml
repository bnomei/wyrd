name: Publish crates

on:
  workflow_dispatch:
    inputs:
      action:
        description: Validate package contents or publish version 0.3.0.
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate publishable packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - name: Inspect wyrd-for-games package contents
        run: cargo package -p wyrd-for-games --locked --list
      - name: Inspect wyrd-for-games-bevy package contents
        run: cargo package -p wyrd-for-games-bevy --locked --list
      - name: Test wyrd-for-games examples as published
        run: |
          cargo test -p wyrd-for-games \
            --doc \
            --no-default-features \
            --features "std,signal-f32,serde-ron,serde-json,schema" \
            --locked
      - name: Build public rustdoc without warnings
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc --workspace --no-deps
      - name: Dry-run publish wyrd-for-games
        run: cargo publish -p wyrd-for-games --locked --dry-run

  publish:
    name: Publish in dependency order
    if: ${{ inputs.action == 'publish' }}
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - name: Publish wyrd-for-games
        run: cargo publish -p wyrd-for-games --locked
      - name: Wait for wyrd-for-games 0.3.0 on crates.io
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              https://crates.io/api/v1/crates/wyrd-for-games/0.3.0 >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "wyrd-for-games 0.3.0 did not become available on crates.io in five minutes."
          exit 1
      - name: Dry-run publish wyrd-for-games-bevy
        run: cargo publish -p wyrd-for-games-bevy --locked --dry-run
      - name: Publish wyrd-for-games-bevy
        run: cargo publish -p wyrd-for-games-bevy --locked
